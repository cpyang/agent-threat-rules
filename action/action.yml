name: 'ATR Security Scan'
description: 'Scan AI agent skills and MCP tool descriptions for security threats using ATR detection rules'
author: 'ATR Project'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  path:
    description: 'Path to scan (file or directory)'
    required: false
    default: '.'
  severity:
    description: 'Minimum severity to report (critical, high, medium, low)'
    required: false
    default: 'medium'
  fail-on-findings:
    description: 'Fail the action if findings are detected'
    required: false
    default: 'false'
  sarif:
    description: 'Output SARIF file for GitHub Security tab'
    required: false
    default: 'true'

outputs:
  findings:
    description: 'Number of findings detected'
  sarif-file:
    description: 'Path to SARIF output file'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Run ATR scan
      id: scan
      shell: bash
      env:
        CI: 'true'
        ATR_SEVERITY: ${{ inputs.severity }}
      run: |
        # Install and run ATR
        npm install -g agent-threat-rules@latest 2>/dev/null

        echo "::group::ATR Security Scan"
        echo "Scanning: ${{ inputs.path }}"
        echo "Minimum severity: ${{ inputs.severity }}"

        # Find scannable files and run scan
        SCAN_PATH="${{ inputs.path }}"
        FINDINGS=0

        # Collect all SKILL.md and MCP-related files
        SKILL_FILES=$(find "$SCAN_PATH" -name "SKILL.md" -o -name "*.skill.md" -o -name "mcp.json" -o -name "mcp-config.json" 2>/dev/null | head -100)

        if [ -z "$SKILL_FILES" ]; then
          echo "No SKILL.md or MCP config files found in $SCAN_PATH"
          echo "findings=0" >> "$GITHUB_OUTPUT"
        elif [ "${{ inputs.sarif }}" = "true" ]; then
          # Scan each file, merge SARIF results
          echo '{"$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"ATR","version":"2.0.0"}},"results":[]}]}' > atr-results.sarif
          for f in $SKILL_FILES; do
            atr scan "$f" --sarif 2>/dev/null > /tmp/atr-single.sarif || continue
            # Merge results into main SARIF
            node -e "
              const fs = require('fs');
              const main = JSON.parse(fs.readFileSync('atr-results.sarif','utf-8'));
              try {
                const single = JSON.parse(fs.readFileSync('/tmp/atr-single.sarif','utf-8'));
                const results = single.runs?.[0]?.results ?? [];
                main.runs[0].results.push(...results);
              } catch {}
              fs.writeFileSync('atr-results.sarif', JSON.stringify(main, null, 2));
            "
          done
          FINDINGS=$(node -e "const d=JSON.parse(require('fs').readFileSync('atr-results.sarif','utf-8'));console.log(d.runs[0].results.length)")
          echo "sarif-file=atr-results.sarif" >> "$GITHUB_OUTPUT"
        else
          for f in $SKILL_FILES; do
            RESULT=$(atr scan "$f" --json 2>/dev/null || echo '{}')
            COUNT=$(echo "$RESULT" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{console.log(JSON.parse(d).matches?.length??0)}catch{console.log(0)}})")
            FINDINGS=$((FINDINGS + COUNT))
          done
        fi

        echo "findings=${FINDINGS}" >> "$GITHUB_OUTPUT"
        echo "::endgroup::"

        if [ "$FINDINGS" -gt 0 ]; then
          echo "::warning::ATR found ${FINDINGS} security finding(s)"
        else
          echo "ATR scan passed - no threats detected"
        fi

        # Fail if configured
        if [ "${{ inputs.fail-on-findings }}" = "true" ] && [ "$FINDINGS" -gt 0 ]; then
          echo "::error::ATR found ${FINDINGS} finding(s). Set fail-on-findings: false to warn instead of fail."
          exit 1
        fi

    - name: Upload SARIF to GitHub Security
      if: inputs.sarif == 'true' && hashFiles('atr-results.sarif') != ''
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: atr-results.sarif
      continue-on-error: true
