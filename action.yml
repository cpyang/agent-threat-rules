name: 'ATR Scan'
description: 'Scan MCP configs and SKILL.md files for AI agent security threats using Agent Threat Rules (ATR)'
author: 'Agent-Threat-Rule'
branding:
  icon: 'shield'
  color: 'green'

inputs:
  path:
    description: 'Path to scan (file or directory)'
    required: false
    default: '.'
  severity:
    description: 'Minimum severity to report (informational, low, medium, high, critical)'
    required: false
    default: 'medium'
  fail-on-finding:
    description: 'Fail the action if threats are found'
    required: false
    default: 'true'
  sarif-file:
    description: 'Path to write SARIF output file'
    required: false
    default: 'atr-results.sarif'
  upload-sarif:
    description: 'Upload SARIF to GitHub Security tab'
    required: false
    default: 'true'

outputs:
  threat-count:
    description: 'Number of threats found'
    value: ${{ steps.scan.outputs.threat_count }}
  sarif-file:
    description: 'Path to the SARIF output file'
    value: ${{ steps.scan.outputs.sarif_path }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install ATR
      shell: bash
      run: npm install -g agent-threat-rules@latest

    - name: Run ATR Scan
      id: scan
      shell: bash
      env:
        ATR_PATH: ${{ inputs.path }}
        ATR_SEVERITY: ${{ inputs.severity }}
        ATR_SARIF_FILE: ${{ inputs.sarif-file }}
        ATR_FAIL_ON_FINDING: ${{ inputs.fail-on-finding }}
      run: |
        set +e

        # Validate severity input
        case "$ATR_SEVERITY" in
          informational|low|medium|high|critical) ;;
          *) echo "::error::Invalid severity: $ATR_SEVERITY"; exit 1 ;;
        esac

        # Validate fail-on-finding input
        case "$ATR_FAIL_ON_FINDING" in
          true|false) ;;
          *) echo "::error::Invalid fail-on-finding: $ATR_FAIL_ON_FINDING (must be true or false)"; exit 1 ;;
        esac

        # Validate path exists
        if [ ! -e "$ATR_PATH" ]; then
          echo "::error::Path not found: $ATR_PATH"
          exit 1
        fi

        # Validate sarif-file path is safe (no directory traversal)
        case "$ATR_SARIF_FILE" in
          *../*|*/..*) echo "::error::Invalid sarif-file path"; exit 1 ;;
        esac

        ATR_STDERR=$(mktemp)
        atr scan "$ATR_PATH" \
          --severity "$ATR_SEVERITY" \
          --sarif > "$ATR_SARIF_FILE" 2>"$ATR_STDERR"

        if [ ! -s "$ATR_SARIF_FILE" ] && [ -s "$ATR_STDERR" ]; then
          echo "::warning::ATR scan produced no output. Errors:"
          cat "$ATR_STDERR"
        fi
        rm -f "$ATR_STDERR"

        # Count threats from SARIF output
        THREAT_COUNT=$(node -e "
          const fs = require('fs');
          try {
            const sarif = JSON.parse(fs.readFileSync(process.argv[1], 'utf8'));
            const count = (sarif.runs || []).reduce((a, r) => a + (r.results || []).length, 0);
            console.log(count);
          } catch { console.log(0); }
        " "$ATR_SARIF_FILE")
        echo "threat_count=${THREAT_COUNT}" >> "$GITHUB_OUTPUT"
        echo "sarif_path=${ATR_SARIF_FILE}" >> "$GITHUB_OUTPUT"

        if [ "${THREAT_COUNT}" -gt "0" ]; then
          echo "::warning::ATR found ${THREAT_COUNT} AI agent security threat(s). See SARIF results for details."
        else
          echo "::notice::ATR scan clean. No threats detected."
        fi

        if [ "$ATR_FAIL_ON_FINDING" = "true" ] && [ "${THREAT_COUNT}" -gt "0" ]; then
          echo "::error::ATR found ${THREAT_COUNT} threat(s). Failing build. Set fail-on-finding: false to warn only."
          exit 1
        fi

    - name: Upload SARIF to GitHub Security
      if: always() && inputs.upload-sarif == 'true'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.scan.outputs.sarif_path }}
        category: atr-scan
      continue-on-error: true
