title: "[RFC] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        ## Request for Comments

        Propose a significant change to ATR — rule format, severity definitions,
        category structure, engine behavior, or governance.

        RFCs are open for community input for at least 14 days before a decision is made.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Rule format / schema
        - Severity definitions
        - Category taxonomy
        - Engine behavior
        - Benchmark methodology
        - Governance / process
        - Ecosystem integration standard
        - Other
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What do you want to change and why?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: |
        What problem does this solve? Who benefits?
        Include data or examples if possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider? Why is this one better?

  - type: textarea
    id: breaking-changes
    attributes:
      label: Breaking Changes
      description: |
        Will this break existing integrations? If so, what's the migration path?

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing RFCs and issues for duplicates
          required: true
        - label: I understand this will be open for community discussion for at least 14 days
          required: true
