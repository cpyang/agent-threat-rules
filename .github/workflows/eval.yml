name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
        env:
          VITEST_POOL_WORKER_COMMUNICATION_TIMEOUT: 300000

      - name: Eval
        run: npm run eval

      - name: Validate rules
        run: npm run validate

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: data/eval-report.json
          if-no-files-found: ignore
